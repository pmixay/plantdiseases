version: "3.8"

services:
  plantdiseases-api:
    build: .
    container_name: plantdiseases-server
    ports:
      - "8000:8000"
    volumes:
      # Mount trained model from host (if available)
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
